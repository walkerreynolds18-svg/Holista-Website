name: Deploy Holista Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site package
        run: |
          curl -L --fail --retry 5 --retry-delay 3 "https://durable-possibly-exhibition-blake.trycloudflare.com/holista-site.zip" -o holista-site.zip
          mkdir public
          unzip -q holista-site.zip -d public
          rm -rf public/.git public/holista-site.zip
          touch public/.nojekyll
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
